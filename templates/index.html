<!DOCTYPE html>
<html>
<head>
    <title>Airbnb Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Airbnb Price Predictor</h1>

    <form action="/predict" method="post">
        <label>Host Id:</label>
        <input type="number" name="Host Id" required><br><br>

        <label>Host Since:</label>
        <input type="date" name="Host Since" required><br><br>

        <label>Neighbourhood:</label>
        <input type="text" name="Neighbourhood" required><br><br>

        <label>Property Type:</label>
        <input type="text" name="Property Type" required><br><br>

        <label>Review Scores Rating (bin):</label>
        <input type="number" step="any" name="Review Scores Rating (bin)" required><br><br>

        <label>Room Type:</label>
        <input type="text" name="Room Type" required><br><br>

        <label>Zipcode:</label>
        <input type="number" step="any" name="Zipcode" required><br><br>

        <label>Beds:</label>
        <input type="number" step="any" name="Beds" required><br><br>

        <label>Number of Records:</label>
        <input type="number" name="Number of Records" required><br><br>

        <label>Number Of Reviews:</label>
        <input type="number" name="Number Of Reviews" required><br><br>

        <label>Review Scores Rating:</label>
        <input type="number" step="any" name="Review Scores Rating" required><br><br>

        <button type="submit">Predict Price</button>
    </form>

    <h2>{{ prediction_text }}</h2>
</body>
</html>
